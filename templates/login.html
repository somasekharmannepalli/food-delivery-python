{% extends 'layout.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-popup">
        <div class="auth-popup-title">
            <h2>Login</h2>
        </div>
        <div class="auth-popup-inputs">
            <input id="login-email" type="email" placeholder="Your email" required>
            <input id="login-password" type="password" placeholder="Password" required>
        </div>
        <button onclick="login()">Login</button>
        <div class="auth-popup-condition">
            <input type="checkbox" required>
            <p>By continuing, i agree to the terms of use & privacy policy.</p>
        </div>
        <p>Create a new account? <span onclick="location.href='/register'">Click here</span></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const result = await response.json();
        if (result.success) {
            alert(result.message);
            location.href = '/';
        } else {
            alert(result.message);
        }
    }
</script>
{% endblock %}
